# infrastructure/traefik/traefik.yml
# Static configuration — requires Traefik restart on changes.
#
# Design decisions:
#   - HTTP-01 challenge for Let's Encrypt (no DNS provider API needed)
#   - exposedByDefault: false — every container must opt-in via labels
#   - Single shared network (traefik-public) — all routed containers join it
#   - File provider enabled for non-Docker services and middleware definitions

# ── API & Dashboard ───────────────────────────────────────────────
api:
  dashboard: true
  insecure: false        # dashboard only accessible via HTTPS + basic auth

# ── Entrypoints ───────────────────────────────────────────────────
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"

# ── Certificate Resolver ──────────────────────────────────────────
# HTTP-01: Traefik temporarily serves a file on port 80 for verification.
# Works out of the box with Hostinger — no API keys required.
# acme.json is created automatically, chmod 600 is set in compose.
certificatesResolvers:
  letsencrypt:
    acme:
      email: sushantg2001@gmail.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

# ── Providers ─────────────────────────────────────────────────────
providers:
  docker:
    exposedByDefault: false
    network: traefik-public     # only route containers on this network
    watch: true                 # detect new/removed containers automatically

  file:
    directory: /config          # dynamic.yml lives here
    watch: true                 # hot-reload without restart

# ── Logging ───────────────────────────────────────────────────────
log:
  level: INFO                   # change to DEBUG when troubleshooting

accessLog:
  filePath: "/logs/access.log"
  bufferingSize: 100