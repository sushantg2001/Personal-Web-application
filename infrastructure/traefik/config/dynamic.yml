# infrastructure/traefik/config/dynamic.yml
# Non-secret configuration only — uploaded by vm-sync, safe to commit.
# Dashboard credentials are in auth.yml — generated by secrets-push, not committed.
# Traefik loads ALL .yml files in this directory automatically.

http:
  middlewares:

    # Applied to all public services via label: secure-headers@file
    secure-headers:
      headers:
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"
          X-Content-Type-Options: "nosniff"

    # Applied to website router via label: www-redirect@file
    www-redirect:
      redirectRegex:
        regex: "^https://www\\.sushantgupta\\.cloud/(.*)"
        replacement: "https://sushantgupta.cloud/${1}"
        permanent: true

  routers:
    traefik-dashboard:
      rule: "Host(`traefik.sushantgupta.cloud`)"
      entryPoints:
        - websecure
      service: api@internal
      middlewares:
        - dashboard-auth
      tls:
        certResolver: letsencrypt