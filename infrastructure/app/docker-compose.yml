# infrastructure/app/docker-compose.yml
# Pulls the pre-built image from GHCR and runs it behind Traefik.
#
# DEPLOY: handled by GitHub Actions on push to main
# MANUAL: docker compose pull && docker compose up -d
# PREREQUISITE: Traefik must be running

services:
  website:
    image: ghcr.io/sushantg2001/personal-site:latest
    pull_policy: always        # always pull latest from GHCR on deploy
    container_name: website
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.website.rule=Host(`sushantgupta.cloud`) || Host(`www.sushantgupta.cloud`)"
      - "traefik.http.routers.website.entrypoints=websecure"
      - "traefik.http.routers.website.tls.certresolver=letsencrypt"
      - "traefik.http.routers.website.middlewares=secure-headers@file,www-redirect@file"
      - "traefik.http.services.website.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true