# .github/workflows/deploy.yml
#
# Triggered by: push to main
# What it does:
#   1. Builds Docker image
#   2. Pushes to GitHub Container Registry (GHCR)
#   3. SSHs into VM → pulls new image → restarts website container
#
# REQUIRED SECRETS (GitHub repo → Settings → Secrets → Actions):
#   VM_HOST     → sushantgupta.cloud
#   VM_USER     → root
#   VM_SSH_KEY  → contents of ~/.ssh/id_vm (private key)
#   VM_PORT     → 22

name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/website

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            # Log into GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image and restart
            cd ~/website
            docker compose pull
            docker compose up -d --force-recreate

            # Remove old images
            docker image prune -f

            echo "Deployed at $(date)"